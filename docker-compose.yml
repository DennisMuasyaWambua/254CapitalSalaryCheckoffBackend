services:
  db:
    image: postgres:15-alpine
    container_name: salary_checkoff_db
    restart: always
    environment:
      POSTGRES_DB: salary_checkoff_db
      POSTGRES_USER: ${DB_USER:-salary_checkoff_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-salary_checkoff_user} -d salary_checkoff_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: salary_checkoff_redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_IMAGE:-salary-checkoff-backend}:${DOCKER_TAG:-latest}
    container_name: salary_checkoff_web
    restart: always
    command: gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 --access-logfile - --error-logfile - config.wsgi:application
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
      - ./staticfiles:/app/staticfiles
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-salary_checkoff_user}:${DB_PASSWORD}@db:5432/salary_checkoff_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_IMAGE:-salary-checkoff-backend}:${DOCKER_TAG:-latest}
    container_name: salary_checkoff_celery_worker
    restart: always
    command: celery -A config worker --loglevel=info --concurrency=4
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-salary_checkoff_user}:${DB_PASSWORD}@db:5432/salary_checkoff_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_IMAGE:-salary-checkoff-backend}:${DOCKER_TAG:-latest}
    container_name: salary_checkoff_celery_beat
    restart: always
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-salary_checkoff_user}:${DB_PASSWORD}@db:5432/salary_checkoff_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
